name: Deploy Full Stack App
 
on:
  push:
    branches:
      - feature/gemini-integration  # Trigger on pushes to the `feature/gemini-integration` branch. You can change this if needed.
 
jobs:
  deploy:
    runs-on: ubuntu-latest  # The OS runner GitHub Actions will use
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Pulls your code from GitHub
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2  # Sets up Docker buildx for building multi-platform image
 
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Define the path where your app will be on the server
            #!/bin/bash
 
            APP_DIR="/home/ubuntu/my-app"
            FRONTEND_DIR="$APP_DIR/frontend"
            BACKEND_DIR="$APP_DIR/backend"

            sudo chown -R $USER:$USER $APP_DIR
            sudo chmod -R 755 $APP_DIR

 
            # Remove the existing my-app directory if it exists
            if [ -d "$APP_DIR" ]; then
              echo "Removing existing directory: $APP_DIR"
              rm -rf $APP_DIR
            fi
 
            # Clone the specific branch directly into the app directory
            git clone -b feature/gemini-integration https://github.com/BharathkumarRG/Test-Env.git $APP_DIR
 
            # Navigate to the app directory
            cd $APP_DIR
 
            # Clean up old Docker containers and images
            docker container prune -f
            docker image prune -a -f
            docker volume prune -f

            echo "VITE_FILE_BASE_URL=${{ secrets.VITE_FILE_BASE_URL }}" > $FRONTEND_DIR/.env
            echo "VITE_BACKEND_SERVER=${{ secrets.VITE_BACKEND_SERVER }}" >> $FRONTEND_DIR/.env
            echo "PROD=${{ secrets.PROD }}" >> $FRONTEND_DIR/.env
            # Create backend .env file from GitHub secrets
            echo "DATABASE=${{ secrets.DATABASE }}" > $BACKEND_DIR/.env
            echo "RESEND_API=${{ secrets.RESEND_API }}" >> $BACKEND_DIR/.env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $BACKEND_DIR/.env
            echo "API_URL=${{ secrets.API_URL }}" >> $BACKEND_DIR/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $BACKEND_DIR/.env
            echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> $BACKEND_DIR/.env
            echo "OPENSSL_CONF=${{ secrets.OPENSSL_CONF }}" >> $BACKEND_DIR/.env
            echo "PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}" >> $BACKEND_DIR/.env
            # Navigate to directory containing docker-compose.yml if not in root
            # cd deploy  # Uncomment and set correct path if needed

            # Use Docker Compose to rebuild and restart
            docker compose down
            docker compose up --build -d